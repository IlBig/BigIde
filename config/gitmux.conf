tmux:
    symbols:
        branch: " "
        hashprefix: "#"
        ahead: "↑·"
        behind: "↓·"
        staged: "● "
        conflict: "✖ "
        modified: "✚ "
        untracked: "… "
        stashed: "⚑ "
        insertions: Σ
        deletions: Δ
        clean: "✔"

    styles:
        clear: "#[none]"
        state: "#[fg=red,bold]"
        branch: "#[fg=cyan,bold]"
        remote: "#[fg=yellow]"
        divergence: "#[fg=yellow]"
        staged: "#[fg=green,bold]"
        conflict: "#[fg=red,bold]"
        modified: "#[fg=blue,bold]"
        untracked: "#[fg=magenta,bold]"
        stashed: "#[fg=cyan,bold]"
        insertions: "#[fg=green]"
        deletions: "#[fg=red]"
        clean: "#[fg=green,bold]"

    layout: [branch, divergence, " ", flags]

    options:
        branch_max_len: 30
        branch_trim: right
        ellipsis: …
        hide_clean: false
