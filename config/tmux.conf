set -g mouse on
set -g status-position bottom
set -g status-interval 2
set -g status-style "bg=default"

# Colori e stile
set -g status-left-length 160
set -g status-right-length 150

# Status Left: Nome sessione + git status (gitmux nella status bar = sempre 1 riga, nessun pane)
set -g status-left "#[fg=black,bg=cyan,bold] #S #[bg=default,fg=cyan]#[default] #(cd #{pane_current_path} && gitmux -cfg $HOME/.bigide/gitmux.conf 2>/dev/null) #[default]"

# Status Right: Risorse con icone standard per massima compatibilità
# CPU: calc media (fissa %%)
# RAM: calc su macOS in GB
set -g status-right "#[fg=white,bg=colour238] CPU: #(ps -A -o %cpu | awk '{s+=$1} END {printf \"%.1f%%\", s/100}') #[fg=white,bg=colour240] RAM: #(vm_stat | awk '/Pages active|Pages wired down|Pages occupied by compressor/{sum+=$NF} END {printf \"%.1fGB\", sum*4096/1024/1024/1024}') #[fg=black,bg=cyan,bold] %d %b %H:%M "

# Border style
set -g pane-active-border-style "fg=cyan"
set -g pane-border-style "fg=colour238"

# Window status - stile tab
setw -g window-status-format "#[fg=colour244,bg=default] #I:#W "
setw -g window-status-current-format "#[fg=cyan,bg=default,bold] [#[fg=white,bg=default,bold]#I:#W#[fg=cyan,bg=default,bold]] "

set -g prefix C-a
bind -n C-a send-prefix

bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D
bind 1 select-pane -t :.0
bind 2 select-pane -t :.1
bind 3 select-pane -t :.2
bind 4 select-pane -t :.3
bind 5 select-pane -t :.4
bind z resize-pane -Z
bind v display-popup -E "bash $HOME/.bigide/scripts/voice-dictation.sh"
bind p display-popup -E "perplexity"

bind Q confirm-before -p "Chiudi BigIDE e termina la sessione? (y/n)" "kill-session"

# Toggle esplora file (pane 0 = colonna sinistra)
bind e run-shell 'pw=$(tmux display-message -p -t ":.0" "#{pane_width}"); if [ "$pw" -le 3 ]; then tmux resize-pane -t ":.0" -x "5%"; else tmux resize-pane -t ":.0" -x 1; fi'

bind ? display-message "BigIDE keys: arrows pane-nav | 1..5 jump pane | z zoom | g git-menu | v voice | p perplexity | Q chiudi"

bind g switch-client -T git-table
bind -T git-table b display-popup -E "bash -lc 'git for-each-ref --format=\"%(refname:short)\" refs/heads | fzf | xargs -I{} git checkout {}'"
bind -T git-table c display-popup -E "bash -lc 'read -p \"Commit msg: \" msg; git commit -m \"$msg\"'"
bind -T git-table p display-popup -E "bash -lc 'git push'"
bind -T git-table s display-popup -E "bash -lc 'git status; echo; read -n 1 -s -r -p \"press any key\"'"
bind -T git-table l display-popup -E "bash -lc 'git log --oneline --graph --decorate -n 30; echo; read -n 1 -s -r -p \"press any key\"'"
bind -T git-table G display-popup -E "bash -lc 'lazygit'"
bind -T git-table Escape switch-client -T root
