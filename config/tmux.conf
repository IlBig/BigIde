set -g mouse on
set -g status-interval 5
# Forza arm64 nativo per tutte le shell nei pannelli (evita Rosetta 2)
set -g default-command "arch -arm64 /bin/zsh -l"

# Sixel: Ghostty lo supporta ma xterm-ghostty non lo dichiara nel terminfo
# Forza la feature → tmux renderizza immagini sixel nativamente nei pane/popup
set -as terminal-features ",xterm-ghostty:sixel"

# Passthrough: richiesto da timg -pk (Kitty in tmux con workaround dedicato)
set -g allow-passthrough all

# ─── Barra sistema (1 riga in cima) ──────────────────────────────────────────
# Git info → pane dedicato in fondo (gestito da git-bar.sh)
set -g status on
set -g status-position top
set -g status-left-length  80
set -g status-right-length 120

set -g status-left  "#[fg=colour232,bg=cyan,bold] #{b:session_path} #[fg=cyan,bg=default,nobold]"
set -g status-right "#[fg=white,bg=colour238] CPU: #($HOME/.bigide/scripts/cpu-usage.sh) #[fg=white,bg=colour240] RAM: #($HOME/.bigide/scripts/ram-usage.sh) #[fg=colour232,bg=cyan,bold] %d %b  %H:%M "

# Window tabs (visibili con più progetti aperti) — Tokyo Night
set -g status-justify left
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#565f89,bg=default]  #W "
setw -g window-status-current-format "#[fg=#c0caf5,bg=#2e3c64,bold]  #W #[fg=default,bg=default,nobold]"


# ─── Bordi e sfondo pannelli ─────────────────────────────────────────────────
# Bordi: linee heavy Tokyo Night — grigio-blu sottile su sfondo scuro
set -g pane-border-lines        heavy
set -g pane-border-style        "fg=#3b4261,bg=#1e2030"
set -g pane-active-border-style "fg=#3b4261,bg=#1e2030"
set -g window-style             "bg=#1e2030"
set -g window-active-style      "bg=#1e2030"

# ─── Prefix ──────────────────────────────────────────────────────────────────
set -g prefix C-a
bind -n C-a send-prefix

# ─── Navigazione pannelli ────────────────────────────────────────────────────
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D
bind 1 select-pane -t :.0
bind 2 select-pane -t :.1
bind 3 select-pane -t :.2
bind 4 select-pane -t :.3
bind 5 select-pane -t :.4
bind z resize-pane -Z

# ─── Navigazione tab (progetti) ────────────────────────────────────────────
bind Tab   next-window
bind BTab  previous-window

# ─── Strumenti ───────────────────────────────────────────────────────────────
bind Space display-popup -E -w "80%" -h "80%" -x "C" -y "C" "bash $HOME/.bigide/scripts/file-search.sh"
bind v display-popup -E "bash $HOME/.bigide/scripts/voice-dictation.sh"
bind p run-shell "bash $HOME/.bigide/scripts/perplexity-toggle.sh"
bind a display-popup -E -w "60%" -h "70%" -x "C" -y "C" "bash $HOME/.bigide/scripts/project-picker.sh"

# ─── Browser 50/50 split (sessione reale Safari/Chrome) ──────────────────────
bind s run-shell -b 'bash $HOME/.bigide/scripts/open-browser.sh'
bind c run-shell -b 'bash $HOME/.bigide/scripts/open-devtools.sh'

# ─── Chiusura sessione ───────────────────────────────────────────────────────
bind Escape kill-session
bind Q confirm-before -p "Chiudi BigIDE e termina la sessione? (y/n)" "kill-session"

# ─── Toggle larghezza esplora file (40 col ↔ nascosto) ───────────────────────
bind e run-shell 'pw=$(tmux display-message -p -t ":.0" "#{pane_width}"); if [ "$pw" -le 3 ]; then tmux resize-pane -t ":.0" -x 40; else tmux resize-pane -t ":.0" -x 1; fi'

# ─── Which-Key help ─────────────────────────────────────────────────────────
bind ? display-popup -E -w "46" -h "30" -x "C" -y "C" "bash $HOME/.bigide/scripts/which-key.sh"

# ─── AI Runner Selector ────────────────────────────────────────────────────
bind m display-popup -E -w "60" -h "22" -x "C" -y "C" "bash $HOME/.bigide/scripts/runner-selector.sh"

# ─── Git ────────────────────────────────────────────────────────────────────
bind g display-popup -E -w "80%" -h "80%" -x "C" -y "C" "bash $HOME/.bigide/scripts/git-lazygit.sh"
bind b display-popup -E -w "60%" -h "50%" -x "C" -y "C" "bash $HOME/.bigide/scripts/git-branch.sh"
