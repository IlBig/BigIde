set -g mouse on
set -g status-interval 5
# Forza arm64 nativo per tutte le shell nei pannelli (evita Rosetta 2)
set -g default-command "arch -arm64 /bin/zsh -l"

# ─── Barra sistema (1 riga in cima) ──────────────────────────────────────────
# Git info → pane dedicato in fondo (gestito da git-bar.sh)
set -g status on
set -g status-position top
set -g status-left-length  80
set -g status-right-length 120

set -g status-left  "#[fg=colour232,bg=cyan,bold] #{b:session_path} #[fg=cyan,bg=default,nobold]"
set -g status-right "#[fg=white,bg=colour238] CPU: #($HOME/.bigide/scripts/cpu-usage.sh) #[fg=white,bg=colour240] RAM: #($HOME/.bigide/scripts/ram-usage.sh) #[fg=colour232,bg=cyan,bold] %d %b  %H:%M "

# Nessun window list nel centro (una sola finestra "main")
set -g status-justify left
setw -g window-status-format         ""
setw -g window-status-current-format ""


# ─── Bordi e sfondo pannelli ─────────────────────────────────────────────────
# Tutti i bordi = colore sfondo → invisibili, zero gap visibili tra pannelli
set -g pane-border-style        "fg=#1e2030,bg=#1e2030"
set -g pane-active-border-style "fg=#1e2030,bg=#1e2030"
set -g window-style             "bg=#1e2030"
set -g window-active-style      "bg=#1e2030"

# ─── Prefix ──────────────────────────────────────────────────────────────────
set -g prefix C-a
bind -n C-a send-prefix

# ─── Navigazione pannelli ────────────────────────────────────────────────────
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D
bind 1 select-pane -t :.0
bind 2 select-pane -t :.1
bind 3 select-pane -t :.2
bind 4 select-pane -t :.3
bind 5 select-pane -t :.4
bind z resize-pane -Z

# ─── Strumenti ───────────────────────────────────────────────────────────────
bind v display-popup -E "bash $HOME/.bigide/scripts/voice-dictation.sh"
bind p display-popup -E "perplexity"

# ─── Chiusura sessione ───────────────────────────────────────────────────────
bind Q confirm-before -p "Chiudi BigIDE e termina la sessione? (y/n)" "kill-session"

# ─── Toggle larghezza esplora file (40 col ↔ nascosto) ───────────────────────
bind e run-shell 'pw=$(tmux display-message -p -t ":.0" "#{pane_width}"); if [ "$pw" -le 3 ]; then tmux resize-pane -t ":.0" -x 40; else tmux resize-pane -t ":.0" -x 1; fi'

bind ? display-message "BigIDE keys: arrows pane-nav | 1..5 jump pane | z zoom | v voice | p perplexity | Q chiudi"

# ─── Menu git ────────────────────────────────────────────────────────────────
bind g switch-client -T git-table
bind -T git-table b display-popup -E "bash -lc 'git for-each-ref --format=\"%(refname:short)\" refs/heads | fzf | xargs -I{} git checkout {}'"
bind -T git-table c display-popup -E "bash -lc 'read -p \"Commit msg: \" msg; git commit -m \"\$msg\"'"
bind -T git-table p display-popup -E "bash -lc 'git push'"
bind -T git-table s display-popup -E "bash -lc 'git status; echo; read -n 1 -s -r -p \"press any key\"'"
bind -T git-table l display-popup -E "bash -lc 'git log --oneline --graph --decorate -n 30; echo; read -n 1 -s -r -p \"press any key\"'"
bind -T git-table G display-popup -E "bash -lc 'lazygit'"
bind -T git-table Escape switch-client -T root
